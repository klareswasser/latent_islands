<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="二級河川以上の川だけ、または川と海で囲まれた日本の陸地を抽出する地図。">
  <title>日本の隠れた「島？」を探し出す</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>地理データを読み込んでいます…</p>
  </div>

  <div id="map" aria-label="日本全国の潜在島地図"></div>

  <header id="header">
    <h1>日本の隠れた「島？」を探し出す</h1>
    <p>川に囲まれた、あるいは川と海に囲まれた陸地を、隠れた「島？」として抽出。対象河川は二級河川以上。切断後の最大成分は本土側として除外。</p>
  </header>

  <aside id="controls" class="panel" aria-label="地図コントロール">
    <div class="label-row">
      <label for="area-filter">最小面積</label>
      <output id="area-output">0.02 km²</output>
    </div>
    <input id="area-filter" type="range" min="0" max="4" step="0.01" value="0" aria-label="最小面積">
    <div class="filter-footer">
      <span>0.02</span>
      <span class="visible-result"><strong id="visible-count">—</strong> 島を表示</span>
      <span>10,000 km²</span>
    </div>
    <div class="opacity-control">
      <div class="label-row">
        <label for="opacity-filter">全体の透明度</label>
        <output id="opacity-output">20%</output>
      </div>
      <input id="opacity-filter" type="range" min="0" max="80" step="5" value="20" aria-label="全体の透明度">
      <div class="opacity-footer"><span>不透明</span><span>透明</span></div>
    </div>
  </aside>

  <aside id="about" class="panel">
    <div class="about-body">
      <h2>データ出典</h2>
      <p>国土交通省「国土数値情報」<br>N03 行政区域（2025）<br>W05 河川（2006〜2009）</p>
    </div>
  </aside>

  <details id="about-mobile" class="panel">
    <summary aria-label="データ出典">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor" aria-hidden="true"><path d="M11 17h2v-6h-2v6zm1-15A10 10 0 1 0 12 22 10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm-1-11h2V7h-2v2z"/></svg>
    </summary>
    <div class="about-body">
      <h2>データ出典</h2>
      <p>国土交通省「国土数値情報」<br>N03 行政区域（2025）<br>W05 河川（2006〜2009）</p>
    </div>
  </details>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
